app-id: io.github.bggRGjQaUbCoE.PiliPlus
runtime: org.gnome.Platform
runtime-version: '50'
sdk: org.gnome.Sdk
command: piliplus
separate-locales: false
finish-args:
  - --share=ipc
  - --share=network
  - --socket=fallback-x11
  - --socket=wayland
  - --socket=pulseaudio
  - --device=dri
  - --own-name=com.example.piliplus
  - --talk-name=org.freedesktop.ScreenSaver
  - --talk-name=org.kde.StatusNotifierWatcher
cleanup:
  - /lib/debug
modules:
  - ../shared-modules/libayatana-appindicator/libayatana-appindicator-gtk3.json
  - name: shaderc
    buildsystem: cmake
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DSHADERC_SKIP_TESTS=ON
      - -DSHADERC_SKIP_EXAMPLES=ON
      - -DSHADERC_SKIP_EXECUTABLES=ON
    cleanup:
      - /bin
      - /include
      - /lib/*.a
      - /lib/*.la
      - /lib/cmake
      - /lib/pkgconfig
    sources:
      - type: archive
        url: https://github.com/google/shaderc/archive/refs/tags/v2026.2.tar.gz
        sha256: f924178e75e3293082481b25ed64d5e48a795b479dac3bd3c83d23070855df42
        x-checker-data:
          type: anitya
          project-id: 19047
          url-template: 
            https://github.com/google/shaderc/archive/refs/tags/v$version.tar.gz
      - type: archive
        url: 
          https://github.com/KhronosGroup/glslang/archive/refs/tags/16.3.0.tar.gz
        sha256: efff5a15258dce1ca2d323bf64c974f5fca03778174615dbc30c8d36db645bf5
        dest: third_party/glslang
        x-checker-data:
          type: anitya
          project-id: 205796
          url-template: 
            https://github.com/KhronosGroup/glslang/archive/refs/tags/$version.tar.gz
      - type: archive
        url: 
          https://github.com/KhronosGroup/SPIRV-Headers/archive/refs/tags/vulkan-sdk-1.4.350.0.tar.gz
        sha256: 9905d9341f20388adb852c77dd982f2c4d539fd68e6c1f1bcebf034715f2d1d5
        dest: third_party/spirv-headers
        x-checker-data:
          type: anitya
          project-id: 334920
          url-template: 
            https://github.com/KhronosGroup/SPIRV-Headers/archive/refs/tags/vulkan-sdk-$version.tar.gz
      - type: archive
        url: 
          https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/v2026.2.tar.gz
        sha256: b4390652e64ab188eede9d556cf183b3c1c4be44d4fcd104b0d4af3bea2712d1
        dest: third_party/spirv-tools
        x-checker-data:
          type: anitya
          project-id: 14894
          url-template: 
            https://github.com/KhronosGroup/SPIRV-Tools/archive/refs/tags/v$version.tar.gz
  - name: hwdata
    buildsystem: autotools
    cleanup:
      - /share/pkgconfig
    sources:
      - type: archive
        url: https://github.com/vcrhonek/hwdata/archive/refs/tags/v0.408.tar.gz
        sha256: ac7c34efc5941d5cbf739a8f7f6c84b1c2edea493fd3fca10906ef64d7afd690
        x-checker-data:
          type: anitya
          project-id: 5387
          url-template: 
            https://github.com/vcrhonek/hwdata/archive/refs/tags/v$version.tar.gz
  - name: libass
    buildsystem: meson
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: archive
        url: 
          https://github.com/libass/libass/releases/download/0.17.4/libass-0.17.4.tar.xz
        sha256: 78f1179b838d025e9c26e8fef33f8092f65611444ffa1bfc0cfac6a33511a05a
        x-checker-data:
          type: anitya
          project-id: 1560
          url-template: 
            https://github.com/libass/libass/releases/download/$version/libass-$version.tar.xz
  - name: libdisplay-info
    buildsystem: meson
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: archive
        url: 
          https://gitlab.freedesktop.org/emersion/libdisplay-info/-/archive/0.3.0/libdisplay-info-0.3.0.tar.gz
        sha256: 2b467e3336aec63819d6aca28d7310d3dc7415b2b3a3c3a5aec9d3727053c078
        x-checker-data:
          type: anitya
          project-id: 326668
          url-template: 
            https://gitlab.freedesktop.org/emersion/libdisplay-info/-/archive/$version/libdisplay-info-$version.tar.gz
  - name: libplacebo
    buildsystem: meson
    config-opts:
      - -Ddemos=False
    cleanup:
      - /include
      - /lib/pkgconfig
    sources:
      - type: git
        url: https://github.com/haasn/libplacebo.git
        tag: v7.360.1
        commit: cee9b076f2c63104ccfd497fa79c39a867293ec4
        x-checker-data:
          type: json
          url: https://api.github.com/repos/haasn/libplacebo/releases/latest
          tag-query: .tag_name
  - name: libXpresent
    buildsystem: meson
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/man
    sources:
      - type: archive
        url: 
          https://xorg.freedesktop.org/archive/individual/lib/libXpresent-1.0.2.tar.xz
        sha256: 4e5b21b4812206a4b223013606ae31170502c1043038777a1ef8f70c09d37602
        x-checker-data:
          type: anitya
          project-id: 17166
          url-template: 
            https://xorg.freedesktop.org/archive/individual/lib/libXpresent-$version.tar.xz
  - name: libmpv
    cleanup:
      - /include
      - /lib/pkgconfig
      - /share/bash-completion
      - /share/zsh
    buildsystem: meson
    config-opts:
      - -Dlibmpv=true
      - -Dcplayer=false
      - -Dbuild-date=false
    sources:
      - type: archive
        url: https://github.com/mpv-player/mpv/archive/v0.41.0.tar.gz
        sha256: ee21092a5ee427353392360929dc64645c54479aefdb5babc5cfbb5fad626209
        x-checker-data:
          type: anitya
          project-id: 5348
          url-template: 
            https://github.com/mpv-player/mpv/archive/v$version.tar.gz
  - name: piliplus
    buildsystem: simple
    build-commands:
      - install -Dm644 data/flutter_assets/assets/images/logo/logo.png 
        /app/share/icons/hicolor/512x512/apps/$FLATPAK_ID.png
      - cp -r . /app/share/piliplus
      - mkdir -p /app/bin
      - ln -s /app/share/piliplus/piliplus /app/bin/piliplus
      - install -Dm644 io.github.bggRGjQaUbCoE.PiliPlus.desktop -t 
        /app/share/applications/
      - install -Dm644 io.github.bggRGjQaUbCoE.PiliPlus.metainfo.xml -t 
        /app/share/metainfo/
    sources:
      #- type: archive
      #  only-arches:
      #    - aarch64
      #  url: https://github.com/bggRGjQaUbCoE/PiliPlus/releases/download/1.1.4.15/PiliPlus_linux_1.1.4%2B4285_arm64.tar.gz
      #  sha256: 7f9c266ca7d0a0d41d113c229f21e5fa12c2ba38031bf4d714b5ae853befb961
      #  x-checker-data:
      #    type: json
      #    url: https://api.github.com/repos/bggRGjQaUbCoE/PiliPlus/releases/latest
      #    version-query: .tag_name
      #    url-query: .assets[] | select(.name | test("PiliPlus_linux_.+_arm64\\.tar\\.gz"))
      #      | .browser_download_url
      - type: archive
        only-arches:
          - x86_64
        url: 
          https://github.com/bggRGjQaUbCoE/PiliPlus/releases/download/2.0.8/PiliPlus_linux_2.0.8%2B5014_amd64.tar.gz
        sha256: 37b7942c42b871f910beb1313e2345483901dcfe90179e4a593832e59f3b515f
        x-checker-data:
          type: json
          url: 
            https://api.github.com/repos/bggRGjQaUbCoE/PiliPlus/releases/latest
          version-query: .tag_name
          url-query: .assets[] | select(.name | 
            test("PiliPlus_linux_.+_amd64\\.tar\\.gz")) | .browser_download_url
      - type: file
        path: io.github.bggRGjQaUbCoE.PiliPlus.desktop
      - type: file
        path: io.github.bggRGjQaUbCoE.PiliPlus.metainfo.xml
