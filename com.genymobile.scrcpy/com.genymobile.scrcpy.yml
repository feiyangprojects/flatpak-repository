id: com.genymobile.scrcpy

runtime: org.freedesktop.Platform
runtime-version: '25.08'
sdk: org.freedesktop.Sdk

add-extensions:
  org.freedesktop.Platform.ffmpeg-full:
    directory: lib/ffmpeg
    add-ld-path: .

command: scrcpy.sh

rename-desktop-file: scrcpy.desktop
rename-icon: scrcpy

finish-args:
  - --device=all
  - --env=SCRCPY_ICON_PATH=/app/share/icons/hicolor/256x256/apps/com.genymobile.scrcpy.png
  - --share=ipc
  - --share=network
  - --socket=pulseaudio
  - --socket=wayland
  - --socket=fallback-x11
  - --persist=.android

modules:
  - name: googletest
    buildsystem: cmake
    config-opts:
      - -DBUILD_GMOCK=OFF
    cleanup:
      - '*'
    sources:
      - type: archive
        url: 
          https://github.com/google/googletest/releases/download/v1.17.0/googletest-1.17.0.tar.gz
        sha256: 65fab701d9829d38cb77c14acdc431d2108bfdbf8979e40eb8ae567edf10b27c
        x-checker-data:
          type: anitya
          project-id: 18290
          url-template: 
            https://github.com/google/googletest/releases/download/v$version/googletest-$version.tar.gz
  - name: protobuf
    buildsystem: cmake
    config-opts:
      - -Dprotobuf_BUILD_TESTS=OFF
    cleanup:
      - '*'
    sources:
      - type: archive
        url: 
          https://github.com/protocolbuffers/protobuf/releases/download/v35.1/protobuf-35.1.tar.gz
        sha256: f0b6838e7522a8da96126d487068c959bc624926368f3024ac8fd03abd0a1ac4
        x-checker-data:
          type: anitya
          project-id: 3715
          url-template: 
            https://github.com/protocolbuffers/protobuf/releases/download/v$version/protobuf-$version.tar.gz
  - name: android-tools
    buildsystem: cmake
    builddir: true
    config-opts:
      - -DANDROID_TOOLS_USE_BUNDLED_LIBUSB=ON
      - -DANDROID_TOOLS_LIBUSB_ENABLE_UDEV=ON
    cleanup:
      - /lib/debug/bin
      - /share/android-tools
      - /share/bash-completion
      - /share/man
    sources:
      - type: archive
        url: 
          https://github.com/nmeum/android-tools/releases/download/36.0.1/android-tools-36.0.1.tar.xz
        sha256: 38e8a84b739480141de0836bf6d581b3339ac7d53d0f7ce8c044a3368c8c2f8f
        x-checker-data:
          type: anitya
          project-id: 226905
          url-template: 
            https://github.com/nmeum/android-tools/releases/download/$version/android-tools-$version.tar.xz
      - type: patch
        path: patches/android-tools/0001-adb-only.patch
  - name: scrcpy
    buildsystem: meson
    config-opts:
      - --buildtype=release
      - -Db_lto=true
      - -Dprebuilt_server=scrcpy-server
      - --strip
    cleanup:
      - /share/applications/scrcpy-console.desktop
      - /share/bash-completion
      - /share/man
      - /share/zsh
    sources:
      - type: archive
        url: https://github.com/Genymobile/scrcpy/archive/refs/tags/v4.1.tar.gz
        sha256: 537b2ade623cb94b6edddfa5c61bf0b0af21484aa8365ea2531b686ea573249a
        x-checker-data:
          type: anitya
          project-id: 226924
          url-template: 
            https://github.com/Genymobile/scrcpy/archive/refs/tags/v$version.tar.gz
      - type: file
        url: 
          https://github.com/Genymobile/scrcpy/releases/download/v4.1/scrcpy-server-v4.1
        sha256: deacb991ed2509715160ffdc7907e47b4160eb30d1566217e9047fd5b8850cae
        dest-filename: scrcpy-server
        x-checker-data:
          type: anitya
          project-id: 226924
          url-template: 
            https://github.com/Genymobile/scrcpy/releases/download/v$version/scrcpy-server-v$version
  - name: scrcpy-wrapper
    buildsystem: simple
    build-commands:
      - install -D scrcpy.sh /app/bin/scrcpy.sh
    sources:
      - type: file
        path: scrcpy.sh
  - name: scrcpy-metadata
    buildsystem: simple
    build-commands:
      - install -D com.genymobile.scrcpy.metainfo.xml 
        /app/share/metainfo/com.genymobile.scrcpy.metainfo.xml
    sources:
      - type: file
        path: com.genymobile.scrcpy.metainfo.xml
